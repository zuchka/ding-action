# Example: wrap an ML training run with DING.
#
# End-of-run rules are particularly useful for training: emit a metric per
# epoch, alert at the end of the run if the model regressed.

name: train
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'   # nightly

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - name: Train under DING
        uses: ding-labs/ding-action@v1
        with:
          rules: ./train-alerts.yaml
          command: python train.py --epochs 50

